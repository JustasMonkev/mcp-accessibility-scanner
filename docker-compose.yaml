services:
  mcp-accessibility-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-accessibility-scanner:latest
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8931"
      - --browser
      - chromium
      - --no-sandbox
      - --output-dir
      - /app/output
    ports:
      - "8931:8931"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
